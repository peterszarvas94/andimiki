<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <title>Andi és Miki esküvője</title>
    <style>
      body {
        position: relative;
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: start center;
        padding: 1.5rem 0;
        box-sizing: border-box;

        &::before {
          content: "";
          position: fixed;
          inset: 0;
          background: url("background.png") center / cover no-repeat;
          filter: blur(10px);
          transform: scale(1.3) scaleX(-1) rotate(350deg);
          opacity: 0.55;
          z-index: -2;
        }

        &::after {
          content: "";
          position: fixed;
          inset: 0;
          background: url("background.png") center / cover no-repeat;
          filter: blur(3px);
          /* opacity: 0.75; */
          z-index: -1;
        }

        @media (max-width: 640px) {
          & {
            padding: 0;
          }
        }
      }

      img {
        display: block;
        width: 100vw;
        max-width: 640px;
        height: auto;
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.18);
        position: relative;
        z-index: 1;
      }
    </style>
  </head>
  <body>
    <img src="meghivo.png" alt="Meghívó" />
  </body>
</html>
